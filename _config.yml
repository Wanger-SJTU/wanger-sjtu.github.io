# Hexo 配置文件
# Site
title: 王二的数字花园
subtitle: ''
description: '一个简约的个人博客，记录技术与生活的点滴'
keywords: '博客, 技术, 生活'
author: wanger-sjtu
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://wanger-sjtu.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: custom

# Markdown renderer
markdown:
  engine: kramed
  gfm: false
  breaks: false
  plugins:
    - hexo-renderer-kramed
kramed:
  gfm: false
  breaks: false
  pedantic: false

# Deployment - 使用 GitHub Actions 自动部署
# 不再需要 hexo deploy 配置

# RSS
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html
