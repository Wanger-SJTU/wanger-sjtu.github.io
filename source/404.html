<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | 页面不存在</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 600px; padding: 2rem; }
    h1 { font-size: 6rem; margin: 0; color: #e94560; }
    h2 { font-size: 1.5rem; font-weight: normal; margin: 1rem 0 2rem; color: #aaa; }
    p { color: #888; margin-bottom: 2rem; }
    a { color: #e94560; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .home { padding: 0.8rem 2rem; border: 1px solid #e94560; border-radius: 4px; color: #e94560; transition: all 0.3s; }
    .home:hover { background: #e94560; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found<br>页面不存在</h2>
    <p>看起来你闯进了未知领地。<br>也许可以试试回到首页？</p>
    <a href="/" class="home">← 回到首页 / Go Home</a>
  </div>
</body>
</html>
